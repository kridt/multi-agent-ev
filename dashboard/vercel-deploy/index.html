<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Scanner</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --card-hover: #16161f;
  --border: rgba(255,255,255,0.06);
  --accent: #00d4aa;
  --accent-dim: rgba(0,212,170,0.1);
  --grade-a: #00d4aa;
  --grade-b: #4ecdc4;
  --grade-c: #ffe66d;
  --grade-d: #ff6b6b;
  --text: #f0f0f5;
  --text2: #8a8a9a;
  --text3: #55556a;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}

body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: rgba(10,10,15,0.85); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
.logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.header-right { display: flex; align-items: center; gap: 16px; }
.conn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; }
.conn-dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.count-badge { font-family: var(--mono); font-size: 13px; color: var(--accent); background: var(--accent-dim); padding: 4px 12px; border-radius: 20px; }

/* Filters */
.filters {
  display: flex; align-items: center; gap: 10px; padding: 12px 24px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.filter-select, .filter-input {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: var(--font);
  outline: none;
}
.filter-select:focus, .filter-input:focus { border-color: rgba(0,212,170,0.3); }
.filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

/* Signal cards */
.signals { padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; max-width: 900px; margin: 0 auto; }

.signal {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; transition: border-color 0.2s;
}
.signal:hover { border-color: rgba(255,255,255,0.1); }
.signal.grade-A { border-left: 3px solid var(--grade-a); }
.signal.grade-B { border-left: 3px solid var(--grade-b); }
.signal.grade-C { border-left: 3px solid var(--grade-c); }
.signal.grade-D { border-left: 3px solid var(--grade-d); }

.signal-top { display: flex; align-items: flex-start; padding: 16px 20px 12px; gap: 14px; }
.grade-lg {
  width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px; flex-shrink: 0;
}
.grade-lg.A { background: rgba(0,212,170,0.12); color: var(--grade-a); }
.grade-lg.B { background: rgba(78,205,196,0.12); color: var(--grade-b); }
.grade-lg.C { background: rgba(255,230,109,0.12); color: var(--grade-c); }
.grade-lg.D { background: rgba(255,107,107,0.12); color: var(--grade-d); }

.match-info { flex: 1; min-width: 0; }
.teams { font-size: 16px; font-weight: 600; line-height: 1.3; }
.teams .vs { color: var(--text3); font-weight: 400; font-size: 12px; margin: 0 6px; }
.meta { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.meta span { font-size: 12px; color: var(--text2); }
.meta .sep { color: var(--text3); }

.rec-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.rec-badge.strong-buy { background: rgba(0,212,170,0.12); color: var(--grade-a); }
.rec-badge.buy { background: rgba(78,205,196,0.12); color: var(--grade-b); }
.rec-badge.hold { background: rgba(255,230,109,0.12); color: var(--grade-c); }
.rec-badge.skip { background: rgba(255,107,107,0.12); color: var(--grade-d); }

/* Metrics row */
.metrics { display: flex; gap: 1px; background: var(--border); }
.metric {
  flex: 1; padding: 10px 16px; background: var(--card); text-align: center;
}
.metric-val { font-family: var(--mono); font-size: 16px; font-weight: 700; }
.metric-val.ev { color: var(--accent); }
.metric-val.odds { color: var(--text); }
.metric-val.prob { color: #a78bfa; }
.metric-val.edge { color: var(--grade-b); }
.metric-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* Selection row */
.selection-row {
  display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;
  border-top: 1px solid var(--border); background: rgba(255,255,255,0.01);
}
.sel-item { font-size: 12px; color: var(--text2); }
.sel-item .val { color: var(--text); font-weight: 500; }
.sel-item .val.green { color: var(--accent); }

/* Expandable explanation */
.explain-toggle {
  display: flex; align-items: center; justify-content: center; padding: 8px;
  border-top: 1px solid var(--border); cursor: pointer; color: var(--text3); font-size: 12px;
  transition: color 0.2s, background 0.2s; gap: 4px; user-select: none;
}
.explain-toggle:hover { color: var(--text2); background: rgba(255,255,255,0.02); }
.explain-toggle .arrow { transition: transform 0.2s; }
.signal.open .explain-toggle .arrow { transform: rotate(180deg); }

.explain { display: none; padding: 16px 20px; border-top: 1px solid var(--border); background: rgba(0,212,170,0.02); }
.signal.open .explain { display: block; }
.explain h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin: 12px 0 6px; }
.explain h4:first-child { margin-top: 0; }
.explain .summary { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 4px; }
.explain ul { list-style: none; padding: 0; }
.explain li { font-size: 12px; color: var(--text2); padding: 3px 0 3px 16px; position: relative; line-height: 1.4; }
.explain li::before { content: ''; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; border-radius: 50%; }
.reason-list li::before { background: var(--accent); }
.risk-list li::before { background: var(--grade-d); opacity: 0.6; }

/* Empty state */
.empty { text-align: center; padding: 80px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-text { font-size: 14px; }

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .filters { padding: 10px 16px; }
  .signals { padding: 12px 16px; }
  .signal-top { padding: 12px 14px 10px; }
  .metric { padding: 8px 10px; }
  .metric-val { font-size: 14px; }
  .teams { font-size: 14px; }
  .selection-row { padding: 8px 14px; flex-wrap: wrap; gap: 8px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">EV Scanner</div>
  </div>
  <div class="header-right">
    <div class="count-badge" id="countBadge">0 picks</div>
    <div class="conn">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Connecting</span>
    </div>
  </div>
</div>

<div class="filters">
  <div>
    <div class="filter-label">League</div>
    <select class="filter-select" id="fLeague">
      <option value="">All Leagues</option>
    </select>
  </div>
  <div>
    <div class="filter-label">Market</div>
    <select class="filter-select" id="fMarket">
      <option value="">All Markets</option>
      <option value="team_corners_ou">Corners O/U</option>
      <option value="team_offsides_ou">Offsides O/U</option>
      <option value="team_goals_ou">Goals O/U</option>
      <option value="btts">BTTS</option>
      <option value="player_shots_ou">Player Shots</option>
      <option value="player_shots_on_target_ou">Player SOT</option>
      <option value="player_tackles_ou">Player Tackles</option>
      <option value="player_passes_ou">Player Passes</option>
      <option value="player_fouls_ou">Player Fouls</option>
      <option value="player_offsides_ou">Player Offsides</option>
      <option value="anytime_goalscorer">Goalscorer</option>
      <option value="player_cards">Player Cards</option>
    </select>
  </div>
  <div>
    <div class="filter-label">Min EV%</div>
    <input class="filter-input" id="fMinEV" type="number" min="0" max="50" step="0.5" value="0" style="width:70px;">
  </div>
  <div>
    <div class="filter-label">Grade</div>
    <select class="filter-select" id="fGrade">
      <option value="">All</option>
      <option value="A">A</option>
      <option value="B">B</option>
      <option value="C">C</option>
      <option value="D">D</option>
    </select>
  </div>
  <div>
    <div class="filter-label">Sort</div>
    <select class="filter-select" id="fSort">
      <option value="ev">Highest EV</option>
      <option value="grade">Best Grade</option>
      <option value="kickoff">Kickoff Time</option>
    </select>
  </div>
</div>

<div class="signals" id="signals">
  <div class="empty">
    <div class="empty-icon">&#9898;</div>
    <div class="empty-text">Scanning for value...</div>
  </div>
</div>

<script>
const S = { signals: [], wsRetry: 0, ws: null };

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtTime(t) {
  if (!t) return '--';
  const d = new Date(t);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
function fmtMarket(m) {
  const map = { team_corners_ou: 'Corners O/U', team_offsides_ou: 'Offsides O/U', team_goals_ou: 'Goals O/U', btts: 'BTTS',
    player_shots_ou: 'Player Shots', player_shots_on_target_ou: 'Player SOT', player_tackles_ou: 'Player Tackles',
    player_passes_ou: 'Player Passes', player_fouls_ou: 'Player Fouls', player_offsides_ou: 'Player Offsides',
    anytime_goalscorer: 'Goalscorer', player_cards: 'Player Cards' };
  return map[m] || m;
}
function rec(g) {
  return { A: ['Strong Buy', 'strong-buy'], B: ['Buy', 'buy'], C: ['Hold', 'hold'], D: ['Skip', 'skip'] }[g] || ['Skip', 'skip'];
}

function render() {
  let sigs = [...S.signals];
  const fl = document.getElementById('fLeague').value;
  const fm = document.getElementById('fMarket').value;
  const fev = parseFloat(document.getElementById('fMinEV').value) || 0;
  const fg = document.getElementById('fGrade').value;
  const fs = document.getElementById('fSort').value;

  if (fl) sigs = sigs.filter(s => s.league === fl);
  if (fm) sigs = sigs.filter(s => s.market === fm);
  if (fev > 0) sigs = sigs.filter(s => (s.ev_pct || 0) >= fev);
  if (fg) sigs = sigs.filter(s => getGrade(s) === fg);

  if (fs === 'ev') sigs.sort((a, b) => (b.ev_pct || 0) - (a.ev_pct || 0));
  else if (fs === 'grade') sigs.sort((a, b) => (getGrade(a)).localeCompare(getGrade(b)));
  else if (fs === 'kickoff') sigs.sort((a, b) => new Date(a.kickoff || 0) - new Date(b.kickoff || 0));

  document.getElementById('countBadge').textContent = sigs.length + ' pick' + (sigs.length !== 1 ? 's' : '');

  // Populate league filter
  const leagues = [...new Set(S.signals.map(s => s.league).filter(Boolean))].sort();
  const leagueSel = document.getElementById('fLeague');
  const curLeague = leagueSel.value;
  if (leagueSel.options.length <= 1) {
    leagues.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; leagueSel.appendChild(o); });
    leagueSel.value = curLeague;
  }

  const el = document.getElementById('signals');
  if (!sigs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#9898;</div><div class="empty-text">No picks match your filters</div></div>';
    return;
  }

  el.innerHTML = sigs.map(s => {
    const g = getGrade(s);
    const [recLabel, recCls] = rec(g);
    const expl = s.explanation || {};
    const reasons = expl.reasons || s.reasons || [];
    const risks = expl.risk_factors || s.risks || [];
    const summary = expl.summary || '';

    return `
    <div class="signal grade-${g}" id="sig-${s.id}">
      <div class="signal-top">
        <div class="grade-lg ${g}">${g}</div>
        <div class="match-info">
          <div class="teams">${esc(s.home || '?')}<span class="vs">vs</span>${esc(s.away || '?')}</div>
          <div class="meta">
            <span>${esc(s.league || '')}</span><span class="sep">&middot;</span>
            <span>${fmtTime(s.kickoff)}</span><span class="sep">&middot;</span>
            <span>${esc(s.bookmaker || '')}</span>
          </div>
        </div>
        <span class="rec-badge ${recCls}">${recLabel}</span>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-val ev">${(s.ev_pct||0).toFixed(1)}%</div><div class="metric-lbl">EV</div></div>
        <div class="metric"><div class="metric-val odds">${(s.odds||0).toFixed(2)}</div><div class="metric-lbl">Odds</div></div>
        <div class="metric"><div class="metric-val prob">${((s.model_prob||0)*100).toFixed(1)}%</div><div class="metric-lbl">Model Prob</div></div>
        <div class="metric"><div class="metric-val edge">${(s.edge||0).toFixed(1)}%</div><div class="metric-lbl">Edge</div></div>
      </div>
      <div class="selection-row">
        <span class="sel-item">Market: <span class="val">${esc(fmtMarket(s.market || ''))}</span></span>
        <span class="sel-item">Selection: <span class="val">${esc(s.selection || '')}</span></span>
        <span class="sel-item">Confidence: <span class="val">${((s.confidence||0)*100).toFixed(0)}%</span></span>
      </div>
      ${(summary || reasons.length || risks.length) ? `
      <div class="explain-toggle" onclick="document.getElementById('sig-${s.id}').classList.toggle('open')">
        Why is this EV? <span class="arrow">&#9660;</span>
      </div>
      <div class="explain">
        ${summary ? `<h4>Analysis</h4><div class="summary">${esc(summary)}</div>` : ''}
        ${reasons.length ? `<h4>Value Reasons</h4><ul class="reason-list">${reasons.map(r => `<li>${esc(r)}</li>`).join('')}</ul>` : ''}
        ${risks.length ? `<h4>Risk Factors</h4><ul class="risk-list">${risks.map(r => `<li>${esc(r)}</li>`).join('')}</ul>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function getGrade(s) {
  if (typeof s.grade === 'string') return s.grade;
  if (s.grade && s.grade.overall) return s.grade.overall;
  return 'D';
}

// WebSocket
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws`;
  setConn(false);
  try { S.ws = new WebSocket(url); } catch { scheduleReconnect(); return; }

  S.ws.onopen = () => { S.wsRetry = 0; setConn(true); };
  S.ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'signal' && msg.data) {
        const idx = S.signals.findIndex(s => s.id === msg.data.id);
        if (idx >= 0) S.signals[idx] = msg.data;
        else S.signals.unshift(msg.data);
        render();
      }
    } catch {}
  };
  S.ws.onclose = () => { setConn(false); scheduleReconnect(); };
  S.ws.onerror = () => { S.ws.close(); };
}

function scheduleReconnect() {
  setTimeout(connectWS, Math.min(1000 * Math.pow(2, S.wsRetry++), 30000));
}

function setConn(on) {
  document.getElementById('connDot').className = 'conn-dot' + (on ? ' on' : '');
  document.getElementById('connLabel').textContent = on ? 'Live' : 'Offline';
}

// Demo signals
const DEMO_SIGNALS = [
  {id:'d1',home:'Arsenal',away:'Chelsea',league:'Premier League',market:'team_corners_ou',selection:'Over 10.5',bookmaker:'Bet365 DK',odds:2.05,model_prob:0.56,ev_pct:8.2,edge:5.8,confidence:0.82,grade:'A',kickoff:new Date(Date.now()+7200000).toISOString(),
    explanation:{summary:'Strong corners value based on both teams\u2019 high corner rates.',reasons:['Arsenal avg 6.2 corners/game (top 3 in PL)','Chelsea concede 5.8 corners/game','H2H avg 12.3 corners last 5 meetings','Model sees 56% chance of Over 10.5 vs implied 48.8%'],risk_factors:['Chelsea may park the bus away','Weather conditions unknown'],recommendation:'Strong Buy'}},
  {id:'d2',home:'Bayern Munich',away:'Dortmund',league:'Bundesliga',market:'player_shots_ou',selection:'Musiala Over 2.5 shots',bookmaker:'Unibet DK',odds:2.15,model_prob:0.54,ev_pct:7.1,edge:4.9,confidence:0.78,grade:'A',kickoff:new Date(Date.now()+10800000).toISOString(),
    explanation:{summary:'Musiala consistently exceeds shot expectations in big games.',reasons:['Musiala avg 3.1 shots/game last 10','Dortmund concede 14.2 shots/game','Der Klassiker typically high-tempo','Model probability 54% vs implied 46.5%'],risk_factors:['Musiala may be rotated','Dortmund pressing may limit chances'],recommendation:'Strong Buy'}},
  {id:'d3',home:'Real Madrid',away:'Sevilla',league:'La Liga',market:'anytime_goalscorer',selection:'Vinicius Jr to score',bookmaker:'Danske Spil',odds:2.40,model_prob:0.48,ev_pct:9.2,edge:6.1,confidence:0.71,grade:'A',kickoff:new Date(Date.now()+14400000).toISOString(),
    explanation:{summary:'Vinicius in strong scoring form at the Bernabeu.',reasons:['Vinicius 6 goals in last 8 home games','Sevilla concede 1.8 goals/game away','xG per 90 of 0.62','Model sees 48% vs implied 41.7%'],risk_factors:['May be rested for Champions League'],recommendation:'Strong Buy'}},
  {id:'d4',home:'Barcelona',away:'Atletico Madrid',league:'La Liga',market:'btts',selection:'Yes',bookmaker:'Danske Spil',odds:1.92,model_prob:0.58,ev_pct:5.8,edge:3.6,confidence:0.75,grade:'B',kickoff:new Date(Date.now()+18000000).toISOString(),
    explanation:{summary:'Both teams score frequently in head-to-head matches.',reasons:['BTTS hit in 7 of last 10 H2H meetings','Barcelona score at home 92% of games','Atletico score away 68% of games'],risk_factors:['Atletico may play ultra-defensive','Simeone tends to shut down big games'],recommendation:'Buy'}},
  {id:'d5',home:'Inter',away:'Juventus',league:'Serie A',market:'team_offsides_ou',selection:'Over 4.5',bookmaker:'Bet365 DK',odds:1.88,model_prob:0.60,ev_pct:5.2,edge:3.1,confidence:0.72,grade:'B',kickoff:new Date(Date.now()+21600000).toISOString(),
    explanation:{summary:'Derby d\u2019Italia historically produces many offsides.',reasons:['Avg 5.8 offsides in last 8 meetings','Inter\u2019s high defensive line triggers offside traps','Juventus avg 2.4 offsides/game away'],risk_factors:['Tactical adjustments may reduce offsides'],recommendation:'Buy'}},
  {id:'d6',home:'Man City',away:'Liverpool',league:'Premier League',market:'team_corners_ou',selection:'Over 9.5',bookmaker:'Bet365 DK',odds:1.95,model_prob:0.57,ev_pct:6.8,edge:4.2,confidence:0.76,grade:'B',kickoff:new Date(Date.now()+25200000).toISOString(),
    explanation:{summary:'Both teams contest corners frequently in this rivalry.',reasons:['Man City avg 6.8 corners/game at home','Liverpool avg 5.9 corners/game away','H2H avg 11.2 corners last 6 meetings'],risk_factors:['Pep may rotate squad for midweek'],recommendation:'Buy'}},
  {id:'d7',home:'PSG',away:'Lyon',league:'Ligue 1',market:'player_tackles_ou',selection:'Verratti Over 3.5 tackles',bookmaker:'Unibet DK',odds:2.30,model_prob:0.49,ev_pct:4.1,edge:2.5,confidence:0.65,grade:'C',kickoff:new Date(Date.now()+28800000).toISOString(),
    explanation:{summary:'Verratti\u2019s tackling rate is above this line in most matches.',reasons:['Verratti avg 4.2 tackles/game last 5','Lyon play high possession forcing duels','Model sees 49% vs implied 43.5%'],risk_factors:['Verratti may be subbed early','Low-tempo match possible'],recommendation:'Hold'}},
  {id:'d8',home:'Copenhagen',away:'Midtjylland',league:'Danish Superliga',market:'team_goals_ou',selection:'Over 2.5',bookmaker:'Danske Spil',odds:1.75,model_prob:0.61,ev_pct:3.2,edge:1.8,confidence:0.60,grade:'D',kickoff:new Date(Date.now()+32400000).toISOString(),
    explanation:{summary:'Slight edge on goals but low confidence.',reasons:['H2H avg 2.8 goals last 6 meetings','Copenhagen strong at home (2.1 goals/game)'],risk_factors:['Midtjylland very defensive away','Small sample of Danish Superliga data','Edge is marginal at 1.8%'],recommendation:'Skip'}}
];

// Load demo signals immediately
S.signals = DEMO_SIGNALS;
setConn(true);
document.getElementById('connLabel').textContent = 'Demo';

// Add demo badge
const demoBadge = document.createElement('div');
demoBadge.style.cssText = 'position:fixed;top:12px;right:16px;z-index:999;background:rgba(255,230,109,0.12);color:#ffe66d;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:600;letter-spacing:1px;border:1px solid rgba(255,230,109,0.2);';
demoBadge.textContent = 'DEMO';
document.body.appendChild(demoBadge);

// Inject extra signals periodically
const extraPool = [
